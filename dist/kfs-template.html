<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Key Fact Statement</title>
  <style>
    :root {
      --page-width: 794px;
      --page-min-height: 1123px;
      --page-padding-x: 28px;
      --border: #111;
      --text: #111;
      --link: #0b2b8f;
      --blue: #082a69;
      --font: Arial, Helvetica, "Noto Sans", "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #e8e8e8;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.23;
    }

    .page {
      position: relative;
      width: var(--page-width);
      min-height: var(--page-min-height);
      margin: 24px auto;
      padding: 52px var(--page-padding-x) 70px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      page-break-after: always;
      break-after: page;
    }

    .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 74px;
      margin-bottom: 18px;
    }

    .topline.no-logo {
      justify-content: flex-end;
      min-height: 52px;
      margin-bottom: 8px;
    }

    .logo {
      width: 170px;
      height: auto;
      display: block;
    }

    .annex {
      margin: 48px 24px 0 0;
      text-align: right;
      font-weight: 700;
      font-size: 13px;
    }

    .no-logo .annex {
      margin-top: 0;
      margin-right: 10px;
      font-size: 16px;
    }

    h1, h2 {
      margin: 0;
      text-align: center;
      font-weight: 700;
    }

    h1 {
      font-size: 15px;
      margin-bottom: 22px;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 44px;
    }

    .section-title {
      margin: 28px 0 14px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    .left-title {
      margin: 0 0 24px 14px;
      text-align: left;
      text-decoration: underline;
      font-size: 16px;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin: 0;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 8px 7px;
      vertical-align: middle;
      text-align: center;
      font-weight: 400;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    th {
      font-weight: 700;
    }

    .kfs td,
    .kfs th {
      height: 36px;
    }

    .kfs .tall td {
      height: 58px;
    }

    .kfs .very-tall td {
      height: 94px;
    }

    .compact td,
    .compact th {
      padding: 4px 7px;
      height: 24px;
    }

    .apr td,
    .apr th {
      padding: 3px 7px;
      height: 18px;
      line-height: 1.18;
    }

    .left {
      text-align: left;
    }

    .right {
      text-align: right;
    }

    .bold {
      font-weight: 700;
    }

    .bank-row th {
      padding: 4px;
      font-weight: 400;
    }

    .date-row td {
      text-align: left;
      padding: 13px 7px;
      line-height: 2.0;
    }

    a {
      color: var(--link);
      text-decoration: underline;
    }

    .small {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.2;
    }

    .footer {
      position: absolute;
      left: 34px;
      bottom: 31px;
      font-size: 13px;
    }

    .page-2 .topline,
    .page-3 .topline {
      min-height: 48px;
      margin-bottom: 0;
    }

    .page-2 .logo,
    .page-3 .logo,
    .page-4 .logo {
      width: 170px;
    }

    .page-4 .topline {
      min-height: 106px;
      margin-bottom: 2px;
    }

    .page-4 h2 {
      margin-bottom: 52px;
    }

    .part2 td {
      padding: 4px 7px;
      line-height: 1.22;
    }

    .part2 .row1 td {
      height: 82px;
    }

    .part2 .row3 td {
      height: 164px;
    }

    .part2 .row6 td {
      height: 28px;
    }

    .repayment-page {
      padding: 54px 36px 54px;
    }

    .repayment-page.second {
      padding-top: 48px;
    }

    .repayment {
      font-size: 13px;
    }

    .repayment th {
      background: var(--blue);
      color: #fff;
      border-color: #aab4cc;
      height: 68px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.22;
    }

    .repayment td {
      border: 1.4px solid #111;
      padding: 3px 7px;
      height: 23px;
      line-height: 1.1;
    }

    .notes {
      margin: 30px 6px 0;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.45;
    }

    .notes p {
      margin: 0 0 11px;
    }

    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        background: #fff;
        font-size: 12px;
        line-height: 1.16;
      }

      .page {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        box-shadow: none;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .kfs td,
      .kfs th {
        height: 30px;
        padding: 4px 6px;
      }

      .kfs .tall td {
        height: 46px;
      }

      .kfs .very-tall td {
        height: 76px;
      }

      .date-row td {
        padding: 9px 7px;
        line-height: 1.7;
      }

      .small {
        margin-top: 8px;
        font-size: 12px;
      }

      .footer {
        bottom: 22px;
        font-size: 12px;
      }

      .page-2 .topline,
      .page-3 .topline {
        min-height: 36px;
      }

      .repayment-page {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .repayment tr {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>

ABRRRQAUUUUAFFFFABSUUUALRRRQB//Z";
    const root = document.getElementById("kfs-root");
    const copy = window.KFS_COPY;
    const data = window.KFS_DATA;

    function t(key) {
      return copy[key] || "";
    }

    function h(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function valueOrBlank(value, fallback = "") {
      const v = value === undefined || value === null ? "" : String(value).trim();
      return v || fallback || " ";
    }

    function linked(url, text = url) {
      const safeUrl = h(url);
      const safeText = h(text);
      return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeText}</a>`;
    }

    function page(inner, options = {}) {
      const showLogo = options.logo !== false;
      const annex = options.annex || "";
      const footer = options.footer ? `<div class="footer">${h(valueOrBlank(data.applicationSubmitted, ""))}</div>` : "";
      const className = options.className ? ` ${options.className}` : "";
      const topClass = showLogo ? "topline" : "topline no-logo";
      const logoHtml = showLogo ? `<img class="logo" src="${logoDataUri}" alt="HDFC Bank">` : "";
      const annexHtml = annex ? `<p class="annex">${h(annex)}</p>` : "";
      return `
        <section class="page${className}">
          <div class="${topClass}">${logoHtml}${annexHtml}</div>
          ${inner}
          ${footer}
        </section>
      `;
    }

    function flow() {
      return String(data.flow || "").toLowerCase() === "insta" ? "insta" : "jumbo";
    }

    function loanTypeLabel() {
      return flow() === "insta" ? t("insta") : t("jumbo");
    }

    function notApplicableLower() {
      return t("notApplicable");
    }

    function rupeeValue(value) {
      return h(valueOrBlank(value, "₹"));
    }

    function lateFeeRows() {
      const isInsta = flow() === "insta";
      const rows = isInsta
        ? [
            ["below_100", "below100"],
            ["100_to_500", "100to_500"],
            ["501_to_5000", "501to_5000"],
            ["5001_to_10000", "5001to_10000"],
            ["10001_to_25000", "10001to_25000"],
            ["25001_to_50000", "25001to_50000"],
            ["above_50000", "above50000"]
          ]
        : [
            ["LT100", "nil"],
            ["101_500", "100"],
            ["501_1000", "500"],
            ["1001_5000", "600"],
            ["5001_10000", "750"],
            ["10001_25000", "900"],
            ["25001_50000", "1100"],
            ["GT50000", "1300"]
          ];
      return rows.map(([slab, fee]) => `
        <tr>
          <td></td>
          <td></td>
          <td colspan="3">${h(t(slab))}</td>
          <td colspan="3">${h(t(fee))}</td>
        </tr>
      `).join("");
    }

    function repaymentRows(start, end) {
      const schedule = Array.isArray(data.repaymentSchedule) ? data.repaymentSchedule : [];
      const rows = schedule.slice(start, end);
      return rows.map((row, index) => `
        <tr>
          <td>${h(row.instalmentNo ?? row.installmentNo ?? start + index + 1)}</td>
          <td>${h(row.outstandingPrincipal ?? "")}</td>
          <td>${h(row.principal ?? "")}</td>
          <td>${h(row.interest ?? "")}</td>
          <td>${h(row.instalment ?? row.installment ?? "")}</td>
        </tr>
      `).join("");
    }

    function repaymentTable(start, end) {
      const interestHeader = flow() === "insta" ? copy.headers.four : copy.headers.fourGST;
      return `
        <table class="repayment">
          <thead>
            <tr>
              <th>${h(copy.headers.one)}</th>
              <th>${h(copy.headers.two)}</th>
              <th>${h(copy.headers.three)}</th>
              <th>${h(interestHeader)}</th>
              <th>${h(copy.headers.five)}</th>
            </tr>
          </thead>
          <tbody>${repaymentRows(start, end)}</tbody>
        </table>
      `;
    }

    function repaymentDetails() {
      return `${h(valueOrBlank(data.repaymentStartDate, ""))}<span class="small">${h(t("repaymentNote"))}</span>`;
    }

    function multiline(value) {
      return h(valueOrBlank(value, "")).replace(/\n/g, "<br>");
    }

    function mainHtml() {
      const isInsta = flow() === "insta";
      const lateHeaderLeft = isInsta ? t("outstandingBalance") : t("TAD");
      const lateHeaderRight = isInsta ? t("latePaymentCharges") : t("lateFee");
      const foreclosureValue = isInsta ? t("foreclosure") : t("foreclosureGST");
      const gstNote1 = isInsta ? t("note1GST") : t("note1");
      const gstNote2 = isInsta ? t("note2GST") : t("note2");
      const loanTermValue = valueOrBlank(data.loanTerm || data.numberOfEPIs, t("months"));

      return [
        page(`
          <h1>${h(t("title"))}</h1>
          <h2>${h(t("part1"))}</h2>
          <table class="kfs">
            <tbody>
              <tr class="bank-row"><th colspan="8">${h(t("bankName"))}</th></tr>
              <tr class="date-row"><td colspan="8">
                ${h(t("date"))} ${h(valueOrBlank(data.date, ""))}<br>
                ${h(t("applicantName"))} ${h(valueOrBlank(data.applicantName, ""))}
              </td></tr>
              <tr>
                <td>1</td><td colspan="2" class="left">${h(t("loanProposalNumber"))}</td>
                <td colspan="2">${h(valueOrBlank(data.loanProposalNumber, ""))}</td>
                <td>${h(t("typeOfLoan"))}</td><td colspan="2">${h(loanTypeLabel())}</td>
              </tr>
              <tr><td>2</td><td colspan="2" class="left">${h(t("sanctionedLoanAmount"))}</td><td colspan="5">${rupeeValue(data.loanAmount)}</td></tr>
              <tr><td>3</td><td colspan="7" class="left">${h(t("disbursementSchedule"))}</td></tr>
              <tr><td>(i)</td><td colspan="2" class="left">${h(t("disbursementUpfront"))}</td><td colspan="5">${h(t("upfront"))}</td></tr>
